<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Браузерное приложение для планирования и управления отпусками сотрудников подразделения с диаграммой Ганта, drag-and-drop редактированием и экспортом данных." />
    <meta name="author" content="Vacation Schedule" />
    <title>Планировщик отпусков</title>
    <script>
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('app-settings') || '{}');
          var t = s.theme || 'system';
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
